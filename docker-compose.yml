version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: carental-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-carental_db}
      POSTGRES_USER: ${DB_USER:-carental_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-carental_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-carental_user} -d ${DB_NAME:-carental_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carental-network
    restart: unless-stopped

  # CarRental Application
  app:
    build: .
    container_name: carental-app
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-carental_db}
      DB_USER: ${DB_USER:-carental_user}
      DB_PASSWORD: ${DB_PASSWORD:-carental_password}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - carental-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres_data:

networks:
  carental-network:
    driver: bridge