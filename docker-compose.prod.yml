version: '3.8'

services:
  # Redis Cache for Session Management and Caching
  redis:
    image: redis:7-alpine
    container_name: carental-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-carental_redis_pass}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - carental-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # PostgreSQL Database with Production Optimizations
  postgres:
    image: postgres:16-alpine
    container_name: carental-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-carental_prod}
      POSTGRES_USER: ${DB_USER:-carental_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      # Performance tuning
      POSTGRES_SHARED_PRELOAD_LIBRARIES: pg_stat_statements
      POSTGRES_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-200}
      POSTGRES_SHARED_BUFFERS: ${DB_SHARED_BUFFERS:-256MB}
      POSTGRES_EFFECTIVE_CACHE_SIZE: ${DB_EFFECTIVE_CACHE_SIZE:-1GB}
      POSTGRES_WORK_MEM: ${DB_WORK_MEM:-4MB}
      POSTGRES_MAINTENANCE_WORK_MEM: ${DB_MAINTENANCE_WORK_MEM:-64MB}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - postgres_logs:/var/log/postgresql
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
      -c log_destination=stderr
      -c log_statement=all
      -c log_min_duration_statement=1000
      -c shared_preload_libraries=pg_stat_statements
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-carental_user} -d ${DB_NAME:-carental_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carental-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # CarRental Application with Production Optimizations
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NODE_ENV: production
    image: carental-app:${APP_VERSION:-latest}
    container_name: carental-app
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
      
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-carental_prod}
      DB_USER: ${DB_USER:-carental_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: postgresql://${DB_USER:-carental_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-carental_prod}
      
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-carental_redis_pass}
      REDIS_URL: redis://:${REDIS_PASSWORD:-carental_redis_pass}@redis:6379
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      
      # Server Configuration
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      
      # Security Configuration
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      SESSION_SECRET: ${SESSION_SECRET}
      HELMET_CSP_NONCE: ${HELMET_CSP_NONCE:-true}
      
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      RATE_LIMIT_SKIP_SUCCESSFUL_REQUESTS: ${RATE_LIMIT_SKIP_SUCCESSFUL_REQUESTS:-true}
      
      # Logging Configuration
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_FILE_ENABLED: ${LOG_FILE_ENABLED:-true}
      LOG_FILE_PATH: ${LOG_FILE_PATH:-/app/logs}
      
      # Performance Configuration
      COMPRESSION_ENABLED: ${COMPRESSION_ENABLED:-true}
      COMPRESSION_LEVEL: ${COMPRESSION_LEVEL:-6}
      BODY_PARSER_LIMIT: ${BODY_PARSER_LIMIT:-10mb}
      
      # File Upload Configuration
      UPLOAD_MAX_SIZE: ${UPLOAD_MAX_SIZE:-5242880}
      UPLOAD_ALLOWED_TYPES: ${UPLOAD_ALLOWED_TYPES:-image/jpeg,image/png,image/webp}
      
      # Admin Configuration
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@carental.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      
      # Monitoring Configuration
      ENABLE_METRICS: ${ENABLE_METRICS:-true}
      METRICS_PORT: ${METRICS_PORT:-9090}
      HEALTH_CHECK_ENABLED: ${HEALTH_CHECK_ENABLED:-true}
      
      # Feature Flags
      FEATURE_BOOKING_ENABLED: ${FEATURE_BOOKING_ENABLED:-true}
      FEATURE_REVIEWS_ENABLED: ${FEATURE_REVIEWS_ENABLED:-true}
      FEATURE_MAINTENANCE_ENABLED: ${FEATURE_MAINTENANCE_ENABLED:-true}
      
      # External Services (Optional)
      EMAIL_SERVICE_ENABLED: ${EMAIL_SERVICE_ENABLED:-false}
      EMAIL_SERVICE_API_KEY: ${EMAIL_SERVICE_API_KEY}
      CLOUD_STORAGE_ENABLED: ${CLOUD_STORAGE_ENABLED:-false}
      CLOUD_STORAGE_BUCKET: ${CLOUD_STORAGE_BUCKET}
      ANALYTICS_ENABLED: ${ANALYTICS_ENABLED:-false}
      ANALYTICS_API_KEY: ${ANALYTICS_API_KEY}
      
    ports:
      - "${PORT:-5000}:5000"
      - "${METRICS_PORT:-9090}:9090"
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
      - app_temp:/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - carental-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
      replicas: ${APP_REPLICAS:-1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.carental.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.carental.tls=true"
      - "traefik.http.routers.carental.tls.certresolver=letsencrypt"

  # Nginx Reverse Proxy with SSL Termination
  nginx:
    image: nginx:alpine
    container_name: carental-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - carental-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Monitoring Stack (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: carental-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - carental-network
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: carental-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - carental-network
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  app_temp:
    driver: local
  postgres_logs:
    driver: local
  nginx_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  carental-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16