name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Test Job
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: carental_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.20.0'
        cache: 'npm'
        cache-dependency-path: |
          apps/backend/package-lock.json
          apps/frontend/package-lock.json

    - name: Install backend dependencies
      run: |
        cd apps/backend
        npm install

    - name: Install frontend dependencies
      run: |
        cd apps/frontend
        npm install

    - name: Run backend tests
      run: |
        cd apps/backend
        npm test
      env:
        NODE_ENV: test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: carental_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        JWT_SECRET: test-secret-key-for-github-actions

    - name: Run frontend tests
      run: |
        cd apps/frontend
        npm test

    - name: Build frontend
      run: |
        cd apps/frontend
        npm run build

  # Build and Push Docker Image
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker-container

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Output image URL
      run: |
        echo "🐳 Docker image pushed successfully!"
        echo "📦 Image URL: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        echo "🔗 GHCR URL: https://github.com/${{ github.repository }}/pkgs/container/${{ github.event.repository.name }}"

  # Deploy Job (Optional - for production deployment)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production..."
        echo "📦 Docker Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        echo ""
        echo "To deploy on your VPS, run:"
        echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        echo "docker-compose up -d"
        echo ""
        echo "This step would typically:"
        echo "1. Connect to your production server"
        echo "2. Pull the latest Docker image"
        echo "3. Update docker-compose.yml"
        echo "4. Restart the services"
        echo "5. Run health checks"
        
        # Example deployment commands (uncomment and modify as needed):
        # ssh user@your-server "cd /path/to/app && docker-compose pull && docker-compose up -d"
        # curl -f http://your-domain.com/api/health || exit 1